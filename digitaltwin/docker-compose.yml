# Timezone policy: every container mounts /etc/localtime + sets TZ to PT so
# all logs, schedules, and timestamps line up with the host (which must be set
# to America/Los_Angeles via `sudo timedatectl set-timezone America/Los_Angeles`).
# Without this containers default to UTC, which made dashboard ages look ~7h
# off and could shift Home Assistant automation timing.

services:
  homeassistant:
    image: homeassistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    volumes:
      - ./ha-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Los_Angeles
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Los_Angeles
    restart: unless-stopped

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    container_name: zigbee2mqtt
    volumes:
      - ./z2m-data:/app/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Los_Angeles
    restart: "no"
    depends_on:
      - mosquitto

  digital-twin-api:
    build: ./api
    container_name: digital-twin-api
    ports:
      - "8000:8000"
    volumes:
      - ./api/data:/app/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - HA_URL=http://172.17.0.1:8123
      - DB_PATH=/app/data/twin.db
      - TZ=America/Los_Angeles
    env_file:
      - ./api/.env
    restart: unless-stopped

  digital-twin-frontend:
    image: nginx:alpine
    container_name: digital-twin-frontend
    ports:
      - "8090:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Los_Angeles
    depends_on:
      - digital-twin-api
    restart: unless-stopped
