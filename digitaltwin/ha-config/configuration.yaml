# ─── Template Lock ────────────────────────────────────────────
lock:
  - platform: template
    name: "Front Door Lock"
    value_template: "{{ is_state('input_select.sim_front_door_lock', 'locked') }}"
    lock:
      action: input_select.select_option
      target:
        entity_id: input_select.sim_front_door_lock
      data:
        option: locked
    unlock:
      action: input_select.select_option
      target:
        entity_id: input_select.sim_front_door_lock
      data:
        option: unlocked


# ─── Template Sensors (binary + measurement) ──────────────────
template:
  - binary_sensor:
      - name: "Living Room Motion"
        unique_id: sim_living_room_motion
        device_class: motion
        state: "{{ is_state('input_boolean.sim_living_room_motion', 'on') }}"
        icon: mdi:motion-sensor

      - name: "Kitchen Motion"
        unique_id: sim_kitchen_motion
        device_class: motion
        state: "{{ is_state('input_boolean.sim_kitchen_motion', 'on') }}"
        icon: mdi:motion-sensor

      - name: "Staircase Motion"
        unique_id: sim_staircase_motion
        device_class: motion
        state: "{{ is_state('input_boolean.sim_staircase_motion', 'on') }}"
        icon: mdi:motion-sensor

      - name: "Front Door Motion"
        unique_id: sim_front_door_motion
        device_class: motion
        state: "{{ is_state('input_boolean.sim_front_door_motion', 'on') }}"
        icon: mdi:motion-sensor

      - name: "Bedroom Principal Motion"
        unique_id: sim_bedroom_principal_motion
        device_class: motion
        state: "{{ is_state('input_boolean.sim_bedroom_principal_motion', 'on') }}"
        icon: mdi:motion-sensor

      - name: "Bedroom Guest Motion"
        unique_id: sim_bedroom_guest_motion
        device_class: motion
        state: "{{ is_state('input_boolean.sim_bedroom_guest_motion', 'on') }}"
        icon: mdi:motion-sensor

      - name: "Estancia Motion"
        unique_id: sim_estancia_motion
        device_class: motion
        state: "{{ is_state('input_boolean.sim_estancia_motion', 'on') }}"
        icon: mdi:motion-sensor

      - name: "Front Door Contact"
        unique_id: sim_front_door_contact
        device_class: door
        state: "{{ is_state('input_boolean.sim_front_door_open', 'on') }}"
        icon: mdi:door-closed

  - sensor:
      - name: "Bathroom 1 Humidity"
        unique_id: sim_bathroom_1_humidity
        device_class: humidity
        unit_of_measurement: "%"
        state: "{{ states('input_number.sim_bathroom_1_humidity') | int }}"
        icon: mdi:water-percent

      - name: "Bathroom 2 Humidity"
        unique_id: sim_bathroom_2_humidity
        device_class: humidity
        unit_of_measurement: "%"
        state: "{{ states('input_number.sim_bathroom_2_humidity') | int }}"
        icon: mdi:water-percent

      - name: "Bathroom 3 Humidity"
        unique_id: sim_bathroom_3_humidity
        device_class: humidity
        unit_of_measurement: "%"
        state: "{{ states('input_number.sim_bathroom_3_humidity') | int }}"
        icon: mdi:water-percent

      - name: "Living Room TV"
        unique_id: sim_living_room_tv
        icon: mdi:television
        state: "{{ states('input_boolean.sim_living_room_tv') }}"
