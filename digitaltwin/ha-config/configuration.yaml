# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ═══════════════════════════════════════════════════════════════
#  Digital Twin — Simulated Devices
#
#  Rooms: living_room, kitchen, front_door, staircase,
#         bedroom_principal, bedroom_guest,
#         bathroom_1, bathroom_2, bathroom_3, estancia
# ═══════════════════════════════════════════════════════════════


# ─── Input Booleans ───────────────────────────────────────────
input_boolean:

  # Lights
  sim_living_room_light:
    name: "Sim Living Room Light"
    icon: mdi:ceiling-light
  sim_kitchen_light:
    name: "Sim Kitchen Light"
    icon: mdi:ceiling-light
  sim_staircase_light:
    name: "Sim Staircase Light"
    icon: mdi:wall-sconce
  sim_bedroom_principal_light:
    name: "Sim Bedroom Principal Light"
    icon: mdi:lamp
  sim_bedroom_guest_light:
    name: "Sim Bedroom Guest Light"
    icon: mdi:lamp
  sim_bathroom_1_light:
    name: "Sim Bathroom 1 Light"
    icon: mdi:vanity-light
  sim_bathroom_2_light:
    name: "Sim Bathroom 2 Light"
    icon: mdi:vanity-light
  sim_bathroom_3_light:
    name: "Sim Bathroom 3 Light"
    icon: mdi:vanity-light
  sim_estancia_light:
    name: "Sim Estancia Light"
    icon: mdi:floor-lamp

  # Motion sensors
  sim_living_room_motion:
    name: "Sim Living Room Motion"
    icon: mdi:motion-sensor
  sim_kitchen_motion:
    name: "Sim Kitchen Motion"
    icon: mdi:motion-sensor
  sim_staircase_motion:
    name: "Sim Staircase Motion"
    icon: mdi:motion-sensor
  sim_front_door_motion:
    name: "Sim Front Door Motion"
    icon: mdi:motion-sensor
  sim_bedroom_principal_motion:
    name: "Sim Bedroom Principal Motion"
    icon: mdi:motion-sensor
  sim_bedroom_guest_motion:
    name: "Sim Bedroom Guest Motion"
    icon: mdi:motion-sensor
  sim_estancia_motion:
    name: "Sim Estancia Motion"
    icon: mdi:motion-sensor

  # Door
  sim_front_door_open:
    name: "Sim Front Door Open"
    icon: mdi:door-open

  # TV
  sim_living_room_tv:
    name: "Sim Living Room TV"
    icon: mdi:television


# ─── Input Numbers (brightness, humidity) ─────────────────────
input_number:

  sim_living_room_brightness:
    name: "Sim Living Room Brightness"
    min: 0
    max: 255
    step: 1
    initial: 200
  sim_kitchen_brightness:
    name: "Sim Kitchen Brightness"
    min: 0
    max: 255
    step: 1
    initial: 220
  sim_staircase_brightness:
    name: "Sim Staircase Brightness"
    min: 0
    max: 255
    step: 1
    initial: 150
  sim_bedroom_principal_brightness:
    name: "Sim Bedroom Principal Brightness"
    min: 0
    max: 255
    step: 1
    initial: 180
  sim_bedroom_guest_brightness:
    name: "Sim Bedroom Guest Brightness"
    min: 0
    max: 255
    step: 1
    initial: 180
  sim_bathroom_1_brightness:
    name: "Sim Bathroom 1 Brightness"
    min: 0
    max: 255
    step: 1
    initial: 255
  sim_bathroom_2_brightness:
    name: "Sim Bathroom 2 Brightness"
    min: 0
    max: 255
    step: 1
    initial: 255
  sim_bathroom_3_brightness:
    name: "Sim Bathroom 3 Brightness"
    min: 0
    max: 255
    step: 1
    initial: 255
  sim_estancia_brightness:
    name: "Sim Estancia Brightness"
    min: 0
    max: 255
    step: 1
    initial: 200

  sim_bathroom_1_humidity:
    name: "Sim Bathroom 1 Humidity"
    min: 20
    max: 100
    step: 1
    initial: 55
  sim_bathroom_2_humidity:
    name: "Sim Bathroom 2 Humidity"
    min: 20
    max: 100
    step: 1
    initial: 50
  sim_bathroom_3_humidity:
    name: "Sim Bathroom 3 Humidity"
    min: 20
    max: 100
    step: 1
    initial: 50


# ─── Input Select (lock state) ────────────────────────────────
input_select:

  sim_front_door_lock:
    name: "Sim Front Door Lock"
    options:
      - locked
      - unlocked
    initial: locked
    icon: mdi:lock


# ─── Template Lights ──────────────────────────────────────────
light:
  - platform: template
    lights:

      living_room:
        friendly_name: "Living Room Light"
        value_template: "{{ states('input_boolean.sim_living_room_light') }}"
        level_template: "{{ states('input_number.sim_living_room_brightness') | int }}"
        turn_on:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.sim_living_room_light
        turn_off:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.sim_living_room_light
        set_level:
          action: input_number.set_value
          target:
            entity_id: input_number.sim_living_room_brightness
          data:
            value: "{{ brightness }}"

      kitchen:
        friendly_name: "Kitchen Light"
        value_template: "{{ states('input_boolean.sim_kitchen_light') }}"
