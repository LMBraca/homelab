server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Allow this page to be embedded in an iframe from any origin
    # (needed so the main dashboard at port 8787 can embed the twin at port 8090)
    add_header Content-Security-Policy "frame-ancestors *";

    # Disable caching for dev/homelab
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma        "no-cache";
    add_header Expires       "0";

    # Serve frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/ calls to the digital-twin-api container
    location /api/ {
        proxy_pass            http://digital-twin-api:8000/api/;
        proxy_http_version    1.1;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;
    }

    # Proxy the health endpoint
    location /health {
        proxy_pass            http://digital-twin-api:8000/health;
        proxy_http_version    1.1;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_read_timeout    10s;
        proxy_connect_timeout 5s;
    }
}
