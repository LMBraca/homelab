# Timezone policy: every container mounts /etc/localtime + sets TZ to PT.
# Host must be on America/Los_Angeles
# (`sudo timedatectl set-timezone America/Los_Angeles`).
# Without this containers default to UTC and ages compared against host-written
# naive timestamps (generator.log, project-ideas.jsonl) come out ~7h skewed.

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v0.9.13
    container_name: homepage
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./homepage:/app/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Los_Angeles
      - HOMEPAGE_LOG_LEVEL=warn
      - HOMEPAGE_ALLOWED_HOSTS=100.87.156.88:8088

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    restart: unless-stopped
    pid: host
    privileged: true
    environment:
      - TZ=America/Los_Angeles
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:61208:61208"
  dashboard-api:
    build: ./api
    container_name: dashboard-api
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - TZ=America/Los_Angeles
    env_file:
      - ./api/dashboard-api.env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/snap/nextcloud/common/nextcloud/data:/var/snap/nextcloud/common/nextcloud/data:ro
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
      - /usr/bin/tailscale:/usr/bin/tailscale:ro
      - /usr/sbin/tailscale:/usr/sbin/tailscale:ro
      # Claude Code — node binary + the actual npm global modules + symlink
      - /usr/bin/node:/usr/bin/node:ro
      - /usr/lib/node_modules:/usr/lib/node_modules:ro
      - /usr/bin/claude:/usr/bin/claude:ro
      # Claude account config dirs (for /usage and auth)
      - /home/luis/.claude-account-1:/home/luis/.claude-account-1:ro
      - /home/luis/.claude-account-2:/home/luis/.claude-account-2:ro
      - /home/luis/.claude-account-3:/home/luis/.claude-account-3:ro
      # Ideas output (writable so the API can delete entries and write build jobs)
      - /opt/claude-ideas:/opt/claude-ideas
      # Build runner script (host-side, read-only reference)
      - /home/luis/scripts/claude-ideas/run-build.sh:/home/luis/scripts/claude-ideas/run-build.sh:ro
      # Fetch limits script (host-side, read-only — called by refresh-limits endpoint)
      - /opt/homelab/scripts/claude-ideas/fetch-claude-limits.sh:/opt/homelab/scripts/claude-ideas/fetch-claude-limits.sh:ro
      # Built projects dir (for listing/deleting)
      - /home/luis/claude-builds:/home/luis/claude-builds
