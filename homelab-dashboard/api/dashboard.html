<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bracas homelab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c14;
  --surface:#13161f;
  --surface2:#1c2030;
  --surface3:#242840;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#dde1f0;
  --muted:#5a6080;
  --muted2:#7a84a8;
  --success:#22c55e;
  --danger:#ef4444;
  --warn:#f59e0b;
  --blue:#6366f1;
  --blue2:#818cf8;
  --cyan:#06b6d4;
  --r:12px;
  --hh:56px;
}

/* Full-height column layout — header + scrollable content */
html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow:hidden;
}
body{display:flex;flex-direction:column}

/* ── Header ──────────────────────────────────────────────────────── */
header{
  height:var(--hh);
  display:flex;align-items:center;gap:20px;
  padding:0 24px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:hb 3s ease-in-out infinite}
@keyframes hb{0%,100%{opacity:1}50%{opacity:.4}}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.02em}

.tabs{display:flex;gap:2px;flex:1}
.tab{
  padding:6px 16px;border-radius:8px;
  border:1px solid transparent;
  background:none;color:var(--muted2);
  font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;
}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.active{background:rgba(99,102,241,.15);color:var(--blue2);border-color:rgba(99,102,241,.35)}

.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

/* ── App area fills remaining height ──────────────────────────────── */
#app{
  flex:1;
  min-height:0;    /* required for flex children to shrink below content size */
  position:relative;
  overflow:hidden;
}

/* Each view fills the app area */
.view{
  position:absolute;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
  overflow-y:auto;   /* scroll within the view, not the page */
}
.view.active{opacity:1;pointer-events:auto}

/* Twin view — no scroll, iframe fills it */
#view-twin{overflow:hidden}
#twin-iframe{width:100%;height:100%;border:none;display:block;background:var(--bg)}

/* ── Dashboard layout ─────────────────────────────────────────────── */
main{
  padding:24px;
  display:flex;flex-direction:column;gap:24px;
  max-width:1200px;
  padding-bottom:48px;
}

.section-title{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

/* ── Card ─────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.card.bl-blue   {border-left:3px solid var(--blue)}
.card.bl-cyan   {border-left:3px solid var(--cyan)}
.card.bl-green  {border-left:3px solid var(--success)}
.card.bl-red    {border-left:3px solid var(--danger)}
.card.bl-running{border-left:3px solid var(--blue2)}

.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.ct{font-size:13px;font-weight:500}
.cs{font-size:11px;color:var(--muted);margin-top:2px}

.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.badge-on {background:rgba(34,197,94,.15);color:var(--success)}
.badge-off{background:rgba(255,255,255,.06);color:var(--muted)}
.badge-ok {background:rgba(34,197,94,.15);color:var(--success)}
.badge-err{background:rgba(239,68,68,.12);color:var(--danger)}
.badge-run{background:rgba(99,102,241,.15);color:var(--blue2)}

/* ── Stat bars ────────────────────────────────────────────────────── */
.sr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.sr:last-child{margin-bottom:0}
.sl{font-size:10px;color:var(--muted);width:34px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.sb{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.sf{height:100%;border-radius:2px;transition:width .5s}
.fg{background:var(--success)}
.fb{background:var(--blue2)}
.fc{background:var(--cyan)}
.fw{background:var(--warn)}
.fr{background:var(--danger)}
.sv{font-size:11px;font-variant-numeric:tabular-nums;min-width:30px;text-align:right;color:var(--muted2)}

/* ── Storage ──────────────────────────────────────────────────────── */
.stbar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:10px 0 7px}
.stfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .5s}
.stlabels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.stlabels b{color:var(--text)}

/* ── Backup ───────────────────────────────────────────────────────── */
.bm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.bm{background:var(--surface2);border-radius:8px;padding:12px}
.bm-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.bm-v{font-size:18px;font-weight:600}
.bm-s{font-size:10px;color:var(--muted);margin-top:2px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{
  padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted2);
  transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{background:var(--surface2);color:var(--text)}
.btn-p{background:rgba(99,102,241,.2);color:var(--blue2);border-color:rgba(99,102,241,.4)}
.btn-p:hover{background:rgba(99,102,241,.35);border-color:var(--blue2)}
.btn-p:disabled{opacity:.4;cursor:not-allowed}

.live-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.step-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,.12);color:var(--blue2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500}
.step-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue2);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.pbar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:var(--blue2);border-radius:3px;transition:width .4s}
.pfill.ind{width:35%!important;animation:slide 1.6s ease-in-out infinite}
@keyframes slide{0%{margin-left:0}50%{margin-left:65%}100%{margin-left:0}}
.pinfo{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.curfile{font-size:11px;font-family:monospace;color:var(--muted);background:var(--surface2);border-radius:6px;padding:7px 10px;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Digital Twin card ────────────────────────────────────────────── */
.twin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
.ts{background:var(--surface2);border-radius:10px;padding:14px 12px;display:flex;flex-direction:column;gap:3px}
.ts-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.ts-value{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
.ts-sub{font-size:11px;color:var(--muted2)}

.twin-open{
  display:flex;align-items:center;justify-content:center;
  width:100%;padding:11px;border-radius:9px;
  border:1px solid rgba(99,102,241,.35);
  background:rgba(99,102,241,.1);
  color:var(--blue2);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;
}
.twin-open:hover{background:rgba(99,102,241,.22);border-color:var(--blue2)}

/* ── Peers ────────────────────────────────────────────────────────── */
.peer{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:9px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pdot.on{background:var(--success)}
.pdot.off{background:var(--muted)}
.pname{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pip{font-size:11px;color:var(--muted);font-family:monospace;margin-top:1px}
.page{font-size:10px;color:var(--muted);margin-top:2px}

/* ── Misc ─────────────────────────────────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;background:var(--surface2);border-radius:20px;padding:3px 10px}
.loading{color:var(--muted);font-size:12px;padding:6px 0}
.err{color:var(--danger);font-size:12px;padding:4px 0}

/* ── Responsive ───────────────────────────────────────────────────── */
@media(max-width:680px){
  header{padding:0 14px;gap:12px}
  main{padding:14px;gap:18px}
  .grid2{grid-template-columns:1fr}
  .twin-stats{grid-template-columns:1fr 1fr}
  .bm-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">bracas homelab</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="dashboard" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab"        data-tab="twin"      onclick="showTab('twin')">Digital Twin</button>
  </div>

  <div class="header-right">
    <div class="time" id="clock"></div>
  </div>
</header>

<div id="app">

  <!-- Dashboard view -->
  <div class="view active" id="view-dashboard">
    <main>

      <div>
        <div class="section-title">Servers</div>
        <div class="grid2">
          <div class="card bl-blue" id="stats-main">  <div class="loading">Loading…</div></div>
          <div class="card bl-cyan" id="stats-backup"><div class="loading">Loading…</div></div>
        </div>
      </div>

      <div>
        <div class="section-title">Storage</div>
        <div class="grid2">
          <div class="card" id="st-nc">  <div class="loading">Loading…</div></div>
          <div class="card" id="st-bck"><div class="loading">Loading…</div></div>
        </div>
      </div>

      <div>
        <div class="section-title">Backup</div>
        <div class="card" id="backup"><div class="loading">Loading…</div></div>
      </div>

      <div>
        <div class="section-title">Digital Twin</div>
        <div class="card bl-blue" id="twin-card">
          <div class="ch">
            <div>
              <div class="ct">3D Home</div>
              <div class="cs">Real-time device status</div>
            </div>
            <span class="badge badge-off" id="twin-badge">connecting…</span>
          </div>
          <div class="twin-stats">
            <div class="ts">
              <div class="ts-label">Devices</div>
              <div class="ts-value" id="tn-total">—</div>
            </div>
            <div class="ts">
              <div class="ts-label">Lights On</div>
              <div class="ts-value" id="tn-lights">—</div>
            </div>
            <div class="ts">
              <div class="ts-label">Motion</div>
              <div class="ts-value" id="tn-motion">—</div>
            </div>
            <div class="ts">
              <div class="ts-label">Doors</div>
              <div class="ts-value" id="tn-doors">—</div>
            </div>
          </div>
          <button class="twin-open" onclick="showTab('twin')">Open Digital Twin →</button>
        </div>
      </div>

      <div>
        <div class="section-title">Network — Tailscale</div>
        <div class="grid-auto" id="peers"><div class="loading">Loading…</div></div>
      </div>

    </main>
  </div>

  <!-- Digital Twin view -->
  <div class="view" id="view-twin">
    <iframe id="twin-iframe" src="about:blank" title="Digital Twin"></iframe>
  </div>

</div>

<script>
const TWIN_HOST = location.hostname + ':8090';
const TWIN_URL  = 'http://' + TWIN_HOST;
const TWIN_API  = TWIN_URL + '/api/v1';
const BACKUP_URL = 'http://100.90.102.52:8081';

// ── Tab switching ──────────────────────────────────────────────────────
let twinLoaded = false;

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name)
  );
  document.querySelectorAll('.view').forEach(v =>
    v.classList.toggle('active', v.id === 'view-' + name)
  );
  if (name === 'twin' && !twinLoaded) {
    twinLoaded = true;
    document.getElementById('twin-iframe').src = TWIN_URL;
  }
}

// ── Utilities ──────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const set = (id, html) => { const e = $(id); if (e) e.innerHTML = html; };
const api = path => fetch(path + '?_=' + Date.now()).then(r => { if (!r.ok) throw r; return r.json(); });

function fmtDur(s) {
  if (!s) return '—'; s = +s;
  if (s < 60)   return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}
function fmtAgo(ep) {
  const d = Math.floor(Date.now()/1000 - ep);
  if (d < 60)    return d + 's ago';
  if (d < 3600)  return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}
function barColor(p) {
  if (p >= 90) return 'fr'; if (p >= 75) return 'fw';
  if (p >= 50) return 'fb'; return 'fg';
}
function statRow(label, val, cls) {
  cls = cls || barColor(val);
  return `<div class="sr">
    <div class="sl">${label}</div>
    <div class="sb"><div class="sf ${cls}" style="width:${val}%"></div></div>
    <div class="sv">${val}%</div>
  </div>`;
}
function loop(fn, ms) { fn(); setInterval(fn, ms); }

// ── Clock ──────────────────────────────────────────────────────────────
(function tick() {
  $('clock').textContent = new Date().toLocaleString('en-US', {
    weekday:'short', month:'short', day:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
  setTimeout(tick, 1000);
})();

// ── Server stats ───────────────────────────────────────────────────────
function renderStats(id, name, d) {
  if (d.error) {
    set(id, `<div class="ch"><div class="ct">${name}</div></div><div class="err">Unreachable</div>`);
    return;
  }
  const tmp = d.temp != null ? `<span class="chip">${d.temp}°C</span>` : '';
  set(id, `
    <div class="ch">
      <div><div class="ct">${name}</div><div class="cs">${d.uptime||'—'}</div></div>
      ${tmp}
    </div>
    ${statRow('CPU',  d.cpu)}
    ${statRow('MEM',  d.mem)}
    ${statRow('SWAP', d.swap, d.swap > 50 ? 'fw' : 'fc')}
    ${d.disk != null ? statRow('DISK', d.disk) : ''}
  `);
}

loop(async () => {
  const [main, bck] = await Promise.allSettled([
    api('/api/glances/main'), api('/api/glances/backup'),
  ]);
  renderStats('stats-main',   'Main Server (bracas)',      main.status === 'fulfilled' ? main.value  : {error:1});
  renderStats('stats-backup', 'Backup Server (bracasbck)', bck.status  === 'fulfilled' ? bck.value   : {error:1});
}, 10000);

// ── Storage ────────────────────────────────────────────────────────────
function renderStorage(id, title, sub, d) {
  if (!d || d.total === 'n/a') {
    set(id, `<div class="ch"><div class="ct">${title}</div></div><div class="err">Unavailable</div>`);
    return;
  }
  const p = parseFloat(d.pct) || 0;
  set(id, `
    <div class="ch">
      <div><div class="ct">${title}</div><div class="cs">${sub}</div></div>
      <span class="badge ${p > 80 ? 'badge-err' : 'badge-ok'}">${d.pct}</span>
    </div>
    <div class="stbar"><div class="stfill" style="width:${p}%"></div></div>
    <div class="stlabels">
      <span>Used <b>${d.used}</b></span>
      <span>Free <b>${d.free}</b></span>
      <span>Total <b>${d.total}</b></span>
    </div>
  `);
}

loop(async () => {
  const [nc, bck] = await Promise.allSettled([
    api('/api/nextcloud-disk-fields'), api('/api/backup-disk-fields'),
  ]);
  renderStorage('st-nc',  'Nextcloud Data',     'Main server', nc.status  === 'fulfilled' ? nc.value  : null);
  renderStorage('st-bck', 'Backup Server Disk', 'bracasbck',   bck.status === 'fulfilled' ? bck.value : null);
}, 60000);

// ── Backup ─────────────────────────────────────────────────────────────
async function triggerBackup() {
  const btn = $('run-backup-btn');
  if (!btn || !confirm('Start a manual Nextcloud backup now?')) return;
  btn.disabled = true; btn.textContent = 'Starting…';
  try {
    const r = await fetch('/api/backup/trigger', {method:'POST'});
    const d = await r.json();
    if (!d.ok) { alert('Error: ' + (d.error||'unknown')); btn.disabled=false; btn.textContent='Run Backup'; }
  } catch(e) { alert(e.message); btn.disabled=false; btn.textContent='Run Backup'; }
}

function renderLive(live) {
  const card = $('backup'); card.className = 'card bl-running';
  const elapsed = Math.floor(Date.now()/1000 - live.startedAtEpoch);
  const pct = live.transferPercent ? parseInt(live.transferPercent) : null;
  const hasPct = pct > 0;
  card.innerHTML = `
    <div class="ch">
      <div><div class="ct">Nextcloud Backup</div><div class="cs">Started ${live.startedAt}</div></div>
      <span class="badge badge-run">Running</span>
    </div>
    <div class="live-metrics">
      <div class="bm"><div class="bm-l">Step</div><div style="margin-top:4px"><span class="step-pill">${live.step||'…'}</span></div></div>
      <div class="bm"><div class="bm-l">Elapsed</div><div class="bm-v">${fmtDur(elapsed)}</div></div>
      ${live.transferSpeed ? `<div class="bm"><div class="bm-l">Speed</div><div class="bm-v" style="font-size:15px">${live.transferSpeed}</div></div>` : ''}
      ${live.transferEta   ? `<div class="bm"><div class="bm-l">ETA</div><div class="bm-v" style="font-size:15px">${live.transferEta}</div></div>` : ''}
    </div>
    <div class="pinfo"><span>${hasPct ? live.transferPercent : 'Transferring…'}</span></div>
    <div class="pbar"><div class="pfill ${hasPct?'':'ind'}" style="${hasPct?'width:'+pct+'%':''}"></div></div>
    ${live.currentFile ? `<div class="curfile" style="margin-top:8px">${live.currentFile}</div>` : ''}
    <div class="btn-row"><a class="btn" href="${BACKUP_URL}" target="_blank">Open Dashboard</a></div>
  `;
}

function renderLast(last) {
  const card = $('backup');
  const ok = last.result === 'success';
  card.className = 'card ' + (ok ? 'bl-green' : 'bl-red');
  const db = (last.dbDest||last.dbFile||'—').split('/').pop();
  card.innerHTML = `
    <div class="ch">
      <div><div class="ct">Nextcloud Backup</div>
           <div class="cs">Daily at 10:50am · ${last.finishedAtEpoch ? fmtAgo(last.finishedAtEpoch) : '—'}</div></div>
      <span class="badge ${ok?'badge-ok':'badge-err'}">${ok ? 'Success' : 'Failed'}</span>
    </div>
    ${last.errorLine ? `<div class="err" style="margin-bottom:12px">${last.errorLine}</div>` : ''}
    <div class="bm-grid">
      <div class="bm"><div class="bm-l">Result</div>
        <div class="bm-v" style="font-size:14px;color:var(--${ok?'success':'danger'})">${last.result||'—'}</div></div>
      <div class="bm"><div class="bm-l">Finished</div>
        <div class="bm-v" style="font-size:14px">${(last.finishedAt||'—').split(' ')[1]||'—'}</div>
        <div class="bm-s">${(last.finishedAt||'').split(' ')[0]||''}</div></div>
      <div class="bm"><div class="bm-l">Duration</div><div class="bm-v">${fmtDur(last.durationSeconds)}</div></div>
      <div class="bm"><div class="bm-l">DB size</div>
        <div class="bm-v">${last.dbSize||last.dbFileSize||'—'}</div>
        <div class="bm-s" style="font-size:9px;word-break:break-all">${db}</div></div>
    </div>
    <div class="btn-row">
      <button id="run-backup-btn" class="btn btn-p" onclick="triggerBackup()">Run Backup</button>
      <a class="btn" href="${BACKUP_URL}" target="_blank">Open Dashboard</a>
    </div>
  `;
}

loop(async () => {
  try {
    const live = await api('/api/backup/live');
    if (live?.inProgress) { renderLive(live); return; }
  } catch {}
  try { renderLast(await api('/api/backup/status')); }
  catch {
    $('backup').className = 'card';
    set('backup', `<div class="ch"><div class="ct">Nextcloud Backup</div></div>
      <div class="err">Backup server unreachable</div>
      <div class="btn-row"><a class="btn" href="${BACKUP_URL}" target="_blank">Open Dashboard</a></div>`);
  }
}, 4000);

// ── Digital Twin stats ─────────────────────────────────────────────────
loop(async () => {
  try {
    const [health, devData] = await Promise.all([
      fetch(TWIN_URL + '/health', {cache:'no-store'}).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(TWIN_API + '/twin/devices?_=' + Date.now()).then(r => r.ok ? r.json() : null).catch(() => null),
    ]);

    const badge = $('twin-badge');
    const online = health?.ha_connected;
    if (badge) {
      badge.textContent = online ? 'HA connected' : health ? 'HA offline' : 'Twin offline';
      badge.className   = 'badge ' + (online ? 'badge-on' : 'badge-off');
    }

    const devices = devData?.devices || [];
    const lights    = devices.filter(d => d.domain === 'light');
    const lightsOn  = lights.filter(d => d.live?.state === 'on').length;
    const motion    = devices.filter(d => d.domain === 'binary_sensor' && d.live?.device_class === 'motion' && d.live?.state === 'on').length;
    const doorsOpen = devices.filter(d => d.domain === 'binary_sensor' && d.live?.device_class === 'door'   && d.live?.state === 'on').length;

    set('tn-total',  devices.length || '—');
    set('tn-lights', lights.length ? lightsOn + ' / ' + lights.length : '—');
    set('tn-motion', motion   > 0 ? motion   + ' active' : 'None');
    set('tn-doors',  doorsOpen > 0 ? doorsOpen + ' open' : 'Closed');
  } catch {}
}, 8000);

// ── Tailscale peers ────────────────────────────────────────────────────
loop(async () => {
  try {
    const { peers } = await api('/api/tailscale/peers');
    set('peers', peers.map(p => `
      <div class="peer">
        <div class="pdot ${p.online ? 'on' : 'off'}"></div>
        <div style="min-width:0">
          <div class="pname">${p.name}</div>
          <div class="pip">${p.ip}</div>
          ${p.last_seen ? `<div class="page">${p.last_seen}</div>` : ''}
        </div>
      </div>`).join(''));
  } catch { set('peers', `<div class="err">Tailscale unavailable</div>`); }
}, 30000);
</script>
</body>
</html>
