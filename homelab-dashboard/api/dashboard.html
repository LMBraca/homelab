<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bracas homelab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c14;
  --surface:#13161f;
  --surface2:#1c2030;
  --surface3:#242840;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#dde1f0;
  --muted:#5a6080;
  --muted2:#7a84a8;
  --success:#22c55e;
  --danger:#ef4444;
  --warn:#f59e0b;
  --blue:#6366f1;
  --blue2:#818cf8;
  --cyan:#06b6d4;
  --r:12px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding-bottom:60px}

/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);z-index:10;backdrop-filter:blur(8px);
}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:hb 3s ease-in-out infinite}
@keyframes hb{0%,100%{opacity:1}50%{opacity:.4}}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.02em}
.header-right{display:flex;align-items:center;gap:16px}
.time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

/* Layout */
main{padding:24px 28px;display:flex;flex-direction:column;gap:28px;max-width:1400px}

.section-title{
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}

/* Card */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:18px 20px;transition:border-color .2s;
}
.card:hover{border-color:var(--border2)}
.card.accent-blue{border-left:3px solid var(--blue)}
.card.accent-cyan{border-left:3px solid var(--cyan)}
.card.accent-success{border-left:3px solid var(--success)}
.card.accent-danger{border-left:3px solid var(--danger)}
.card.accent-running{border-left:3px solid var(--blue2);border-color:rgba(129,140,248,.25)}

.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;color:var(--text)}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.card-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;flex-shrink:0}
.badge-on     {background:rgba(34,197,94,.15); color:var(--success)}
.badge-off    {background:rgba(255,255,255,.05);color:var(--muted)}
.badge-success{background:rgba(34,197,94,.15); color:var(--success)}
.badge-failed {background:rgba(239,68,68,.12);  color:var(--danger)}
.badge-running{background:rgba(99,102,241,.15); color:var(--blue2)}

/* Stat row */
.stat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stat-row:last-child{margin-bottom:0}
.stat-label{font-size:11px;color:var(--muted);width:38px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.stat-bar{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .5s ease}
.fill-green{background:var(--success)}
.fill-blue {background:var(--blue2)}
.fill-cyan {background:var(--cyan)}
.fill-warn {background:var(--warn)}
.fill-red  {background:var(--danger)}
.stat-val{font-size:12px;font-variant-numeric:tabular-nums;min-width:34px;text-align:right;color:var(--muted2)}

/* Storage bar */
.storage-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:12px 0 8px}
.storage-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .5s}
.storage-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.storage-labels b{color:var(--text)}

/* Network peers */
.peer{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--surface2);border-radius:8px;
}
.peer-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.peer-dot.on {background:var(--success)}
.peer-dot.off{background:var(--muted)}
.peer-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.peer-ip  {font-size:11px;color:var(--muted);font-family:monospace;margin-top:1px}
.peer-age {font-size:10px;color:var(--muted);margin-top:2px}

/* HA device cards */
.device-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;
}
.device-card:hover{border-color:var(--border2);background:var(--surface3)}
.device-card.is-on{border-color:rgba(34,197,94,.2)}
.device-name{font-size:13px;font-weight:500;margin-bottom:4px}
.toggle-btn{
  width:100%;padding:7px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-size:12px;cursor:pointer;
  transition:all .15s;
}
.toggle-btn:hover{background:rgba(99,102,241,.2);border-color:var(--blue)}
.brightness-wrap{margin-top:8px}
.brightness-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
input[type=range]{width:100%;accent-color:var(--blue2)}

/* Backup card — idle/finished */
.backup-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.bm{background:var(--surface2);border-radius:8px;padding:12px}
.bm-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.bm-value{font-size:18px;font-weight:600}
.bm-sub{font-size:10px;color:var(--muted);margin-top:2px}
.backup-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px}
.btn{
  padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);transition:all .15s;
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:rgba(99,102,241,.2);color:var(--blue2);border-color:rgba(99,102,241,.4)}
.btn-primary:hover{background:rgba(99,102,241,.35);border-color:var(--blue2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:transparent;color:var(--muted2);}
.btn-secondary:hover{background:var(--surface2);color:var(--text)}

/* Backup card — live progress */
.live-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.step-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(99,102,241,.12);color:var(--blue2);
  border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;
}
.step-pill::before{
  content:'';display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--blue2);animation:pulse 1s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.progress-wrap{margin-bottom:12px}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.progress-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue2);border-radius:3px;transition:width .4s}
.progress-fill.indeterminate{width:35%!important;animation:slide 1.6s ease-in-out infinite}
@keyframes slide{0%{margin-left:0}50%{margin-left:65%}100%{margin-left:0}}
.current-file{font-size:11px;font-family:monospace;color:var(--muted);background:var(--surface2);border-radius:6px;padding:8px 10px;margin-bottom:10px;word-break:break-all;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Misc */
.spin{width:10px;height:10px;border:2px solid rgba(99,102,241,.3);border-top-color:var(--blue2);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.temp-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;background:var(--surface2);border-radius:20px;padding:3px 10px;}
.loading{color:var(--muted);font-size:12px;padding:8px 0}
.error-msg{color:var(--danger);font-size:12px;padding:8px 0}
.mono{font-size:11px;font-family:monospace;color:var(--muted);background:var(--surface2);border-radius:6px;padding:8px 10px;margin-top:10px;word-break:break-all}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div><div class="logo-text">bracas homelab</div></div>
  </div>
  <div class="header-right">
    <div class="time" id="clock"></div>
  </div>
</header>

<main>

  <!-- Server Stats -->
  <div>
    <div class="section-title">Server Stats</div>
    <div class="grid grid-2">
      <div class="card accent-blue" id="stats-main"><div class="loading">Loading…</div></div>
      <div class="card accent-cyan" id="stats-backup"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <!-- Storage -->
  <div>
    <div class="section-title">Storage</div>
    <div class="grid grid-2">
      <div class="card" id="storage-nextcloud"><div class="loading">Loading…</div></div>
      <div class="card" id="storage-backup"><div class="loading">Loading…</div></div>
    </div>
  </div>

  <!-- Backup Status -->
  <div>
    <div class="section-title">Backup</div>
    <div class="card" id="backup-status"><div class="loading">Loading…</div></div>
  </div>

  <!-- Network -->
  <div>
    <div class="section-title">Network — Tailscale</div>
    <div class="grid grid-auto" id="network-peers"><div class="loading">Loading…</div></div>
  </div>

  <!-- Home Assistant -->
  <div>
    <div class="section-title">Home Assistant</div>
    <div id="ha-section"><div class="loading">Loading…</div></div>
  </div>

</main>

<script>
const BACKUP_DASH_URL = 'http://100.90.102.52:8081';

// ── Utils ─────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(path + '?_=' + Date.now());
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function pct_color(p) {
  if (p >= 90) return 'fill-red';
  if (p >= 75) return 'fill-warn';
  if (p >= 50) return 'fill-blue';
  return 'fill-green';
}

function stat_row(label, val, color) {
  color = color || pct_color(val);
  return `<div class="stat-row">
    <div class="stat-label">${label}</div>
    <div class="stat-bar"><div class="stat-fill ${color}" style="width:${val}%"></div></div>
    <div class="stat-val">${val}%</div>
  </div>`;
}

function fmt_dur(s) {
  if (s == null || s === '') return '—';
  s = parseInt(s);
  if (s < 60)   return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  return Math.floor(s/3600) + 'h ' + Math.floor(s%3600/60) + 'm';
}

function fmt_ago(ep) {
  const d = Math.floor(Date.now()/1000 - ep);
  if (d < 60)    return d + 's ago';
  if (d < 3600)  return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

function el(id) { return document.getElementById(id); }
function set(id, html) { const e = el(id); if (e) e.innerHTML = html; }

// ── Clock ─────────────────────────────────────────────────────────────
function update_clock() {
  el('clock').textContent = new Date().toLocaleString('en-US', {
    weekday:'short', month:'short', day:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
}
update_clock();
setInterval(update_clock, 1000);

// ── Module runner ─────────────────────────────────────────────────────
function module(fn, interval_ms) {
  fn();
  setInterval(fn, interval_ms);
}

// ── Server Stats ──────────────────────────────────────────────────────
function render_stats(id, name, data) {
  if (data.error) {
    set(id, `<div class="card-header"><div class="card-title">${name}</div></div>
             <div class="error-msg">Unreachable — ${data.error}</div>`);
    return;
  }
  const temp_html = data.temp != null
    ? `<span class="temp-chip">🌡 ${data.temp}°C</span>`
    : '';
  set(id, `
    <div class="card-header">
      <div><div class="card-title">${name}</div>
           <div class="card-sub">${data.uptime || '—'}</div></div>
      ${temp_html}
    </div>
    ${stat_row('CPU',  data.cpu)}
    ${stat_row('MEM',  data.mem,  pct_color(data.mem))}
    ${stat_row('SWAP', data.swap, data.swap > 50 ? 'fill-warn' : 'fill-cyan')}
    ${data.disk != null ? stat_row('DISK', data.disk) : ''}
  `);
}

module(async () => {
  try { render_stats('stats-main',   'Main Server (bracas)',      await api('/api/glances/main')); }
  catch(e) { set('stats-main',   `<div class="error-msg">Main server unreachable</div>`); }
  try { render_stats('stats-backup', 'Backup Server (bracasbck)', await api('/api/glances/backup')); }
  catch(e) { set('stats-backup', `<div class="error-msg">Backup server unreachable</div>`); }
}, 10000);

// ── Storage ───────────────────────────────────────────────────────────
function storage_card(id, title, sub, data) {
  if (data.error || data.total === 'n/a') {
    set(id, `<div class="card-header"><div class="card-title">${title}</div></div>
             <div class="error-msg">Unavailable</div>`);
    return;
  }
  const pct = parseFloat(data.pct) || 0;
  set(id, `
    <div class="card-header">
      <div><div class="card-title">${title}</div>
           <div class="card-sub">${sub}</div></div>
      <span class="card-badge ${pct > 80 ? 'badge-failed' : 'badge-on'}">${data.pct}</span>
    </div>
    <div class="storage-bar">
      <div class="storage-fill" style="width:${pct}%"></div>
    </div>
    <div class="storage-labels">
      <span>Used <b>${data.used}</b></span>
      <span>Free <b>${data.free}</b></span>
      <span>Total <b>${data.total}</b></span>
    </div>
  `);
}

module(async () => {
  try { storage_card('storage-nextcloud', 'Nextcloud Data',    'Main server', await api('/api/nextcloud-disk-fields')); }
  catch(e) { set('storage-nextcloud', `<div class="error-msg">Unavailable</div>`); }
  try { storage_card('storage-backup',   'Backup Server Disk', 'bracasbck',  await api('/api/backup-disk-fields')); }
  catch(e) { set('storage-backup',   `<div class="error-msg">Unavailable</div>`); }
}, 60000);

// ── Backup ────────────────────────────────────────────────────────────
async function trigger_backup() {
  const btn = el('run-backup-btn');
  if (!btn) return;
  if (!confirm('Start a manual Nextcloud backup now?')) return;
  btn.disabled = true;
  btn.innerHTML = '⏳ Starting…';
  try {
    const r = await fetch('/api/backup/trigger', { method: 'POST' });
    const d = await r.json();
    if (!d.ok) {
      alert('Could not start backup: ' + (d.error || 'unknown error'));
      btn.disabled = false;
      btn.innerHTML = '▶ Run Backup Now';
    }
    // success: next poll will pick up live.json and re-render automatically
  } catch(e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '▶ Run Backup Now';
  }
}

function render_live(live) {
  const card = el('backup-status');
  card.className = 'card accent-running';

  const elapsed = Math.floor(Date.now()/1000 - live.startedAtEpoch);
  const pct = live.transferPercent ? parseInt(live.transferPercent) : null;
  const has_pct = pct !== null && pct > 0;

  const noisy = (live.noisyAppdataPreview > 0 || live.noisyAppdataOther > 0)
    ? `<div class="live-metrics" style="margin-top:2px">
        ${live.noisyAppdataPreview > 0 ? `<div class="bm"><div class="bm-label">Preview files</div><div class="bm-value" style="font-size:16px">${live.noisyAppdataPreview.toLocaleString()}</div></div>` : ''}
        ${live.noisyAppdataOther   > 0 ? `<div class="bm"><div class="bm-label">Other appdata</div><div class="bm-value" style="font-size:16px">${live.noisyAppdataOther.toLocaleString()}</div></div>` : ''}
      </div>` : '';

  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-title">Nextcloud Backup</div>
        <div class="card-sub">Started ${live.startedAt}</div>
      </div>
      <span class="card-badge badge-running">● Running</span>
    </div>
    <div class="live-metrics">
      <div class="bm">
        <div class="bm-label">Step</div>
        <div style="margin-top:4px"><span class="step-pill">${live.step || '…'}</span></div>
      </div>
      <div class="bm">
        <div class="bm-label">Elapsed</div>
        <div class="bm-value">${fmt_dur(elapsed)}</div>
      </div>
      ${live.transferSpeed ? `<div class="bm"><div class="bm-label">Speed</div><div class="bm-value" style="font-size:15px">${live.transferSpeed}</div></div>` : ''}
      ${live.transferEta   ? `<div class="bm"><div class="bm-label">ETA</div><div class="bm-value" style="font-size:15px">${live.transferEta}</div></div>` : ''}
    </div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span>${has_pct ? live.transferPercent : 'Transferring…'}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill ${has_pct ? '' : 'indeterminate'}" style="${has_pct ? 'width:'+pct+'%' : ''}"></div>
      </div>
    </div>
    ${live.currentFile ? `<div class="current-file" title="${live.currentFile}">📄 ${live.currentFile}</div>` : ''}
    ${noisy}
    <div class="backup-actions">
      <a href="${BACKUP_DASH_URL}" target="_blank" class="btn btn-secondary">Open Full Dashboard ↗</a>
    </div>
  `;
}

function render_last(last) {
  const card = el('backup-status');
  const ok = last.result === 'success';
  card.className = 'card ' + (ok ? 'accent-success' : 'accent-danger');

  const db = last.dbDest || last.dbFile || '—';
  const dbname = db.split('/').pop();

  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-title">Nextcloud Backup</div>
        <div class="card-sub">Daily at 10:50am — ${last.finishedAtEpoch ? fmt_ago(last.finishedAtEpoch) : '—'}</div>
      </div>
      <span class="card-badge badge-${ok ? 'success' : 'failed'}">${ok ? '✓ Success' : '✗ Failed'}</span>
    </div>
    ${last.errorLine ? `<div class="error-msg" style="margin-bottom:12px">${last.errorLine}</div>` : ''}
    <div class="backup-metrics">
      <div class="bm">
        <div class="bm-label">Result</div>
        <div class="bm-value" style="font-size:14px;color:var(--${ok?'success':'danger'})">${last.result || '—'}</div>
      </div>
      <div class="bm">
        <div class="bm-label">Finished</div>
        <div class="bm-value" style="font-size:13px">${(last.finishedAt||'—').split(' ')[1]||'—'}</div>
        <div class="bm-sub">${last.finishedAt ? last.finishedAt.split(' ')[0] : ''}</div>
      </div>
      <div class="bm">
        <div class="bm-label">Duration</div>
        <div class="bm-value">${fmt_dur(last.durationSeconds)}</div>
      </div>
      <div class="bm">
        <div class="bm-label">DB size</div>
        <div class="bm-value">${last.dbSize || last.dbFileSize || '—'}</div>
        <div class="bm-sub" style="font-size:9px;word-break:break-all">${dbname}</div>
      </div>
    </div>
    <div class="backup-actions">
      <button id="run-backup-btn" class="btn btn-primary" onclick="trigger_backup()">▶ Run Backup Now</button>
      <a href="${BACKUP_DASH_URL}" target="_blank" class="btn btn-secondary">Open Dashboard ↗</a>
    </div>
  `;
}

module(async () => {
  try {
    // Always check live first — it only exists while a backup is running
    const live = await api('/api/backup/live');
    if (live && live.inProgress) {
      render_live(live);
      return;
    }
  } catch(_) {}

  try {
    const last = await api('/api/backup/status');
    render_last(last);
  } catch(e) {
    el('backup-status').className = 'card';
    set('backup-status', `
      <div class="card-header"><div class="card-title">Nextcloud Backup</div></div>
      <div class="error-msg">Backup server unreachable</div>
      <div class="backup-actions">
        <a href="${BACKUP_DASH_URL}" target="_blank" class="btn btn-secondary">Open Dashboard ↗</a>
      </div>
    `);
  }
}, 4000);

// ── Network (Tailscale) ───────────────────────────────────────────────
module(async () => {
  try {
    const { peers } = await api('/api/tailscale/peers');
    const html = peers.map(p => `
      <div class="peer">
        <div class="peer-dot ${p.online ? 'on' : 'off'}"></div>
        <div style="min-width:0">
          <div class="peer-name">${p.name}</div>
          <div class="peer-ip">${p.ip}</div>
          ${p.last_seen ? `<div class="peer-age">${p.last_seen}</div>` : ''}
        </div>
      </div>
    `).join('');
    set('network-peers', html);
  } catch(e) {
    set('network-peers', `<div class="error-msg">Tailscale unavailable</div>`);
  }
}, 30000);

// ── Home Assistant ────────────────────────────────────────────────────
const PRIORITY = ['light','switch','input_boolean','sensor','binary_sensor','climate','cover'];
const SKIP = new Set(['input_number','input_text','person','automation','script','scene',
                      'persistent_notification','tts','zone','sun','weather','update',
                      'conversation','stt','wake_word','assist_pipeline']);

async function ha_control(entity_id, action, data) {
  await fetch('/api/ha/control', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({entity_id, action, data: data||{}})
  });
  setTimeout(poll_ha, 600);
}

function render_ha(devices) {
  const domains = Object.keys(devices)
    .filter(d => !SKIP.has(d))
    .sort((a,b) => {
      const pa = PRIORITY.indexOf(a), pb = PRIORITY.indexOf(b);
      if (pa !== -1 && pb !== -1) return pa - pb;
      if (pa !== -1) return -1;
      if (pb !== -1) return 1;
      return a.localeCompare(b);
    });

  let html = '';
  for (const domain of domains) {
    const items = devices[domain];
    html += `<div style="margin-bottom:20px">
      <div class="section-title" style="margin-bottom:10px">${domain_icon(domain)} ${domain}
        <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">${items.length} entities</span>
      </div>
      <div class="grid grid-auto">`;

    for (const d of items) {
      const on = d.state === 'on';
      const is_light = domain === 'light';
      const is_sensor = domain === 'sensor' || domain === 'binary_sensor';

      if (is_sensor) {
        html += `<div class="device-card">
          <div class="device-name">${d.name}</div>
          <div style="font-size:20px;font-weight:600;margin-top:6px">${d.state}${d.unit ? `<span style="font-size:12px;color:var(--muted);margin-left:2px">${d.unit}</span>` : ''}</div>
        </div>`;
      } else {
        html += `<div class="device-card ${on ? 'is-on' : ''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div class="device-name">${d.name}</div>
            <span class="card-badge badge-${on ? 'on' : 'off'}">${d.state}</span>
          </div>
          <button class="toggle-btn" onclick="ha_control('${d.entity_id}','${on ? 'turn_off' : 'turn_on'}')">
            ${on ? 'Turn Off' : 'Turn On'}
          </button>
          ${is_light && on && d.brightness_pct != null ? `
          <div class="brightness-wrap">
            <div class="brightness-label">
              <span>Brightness</span>
              <span id="bv-${d.entity_id.replace('.','_')}">${d.brightness_pct}%</span>
            </div>
            <input type="range" min="1" max="100" value="${d.brightness_pct}"
              oninput="document.getElementById('bv-${d.entity_id.replace('.','_')}').textContent=this.value+'%'"
              onchange="ha_control('${d.entity_id}','turn_on',{brightness_pct:+this.value})">
          </div>` : ''}
        </div>`;
      }
    }
    html += `</div></div>`;
  }

  el('ha-section').innerHTML = html || '<div class="error-msg">No devices found</div>';
}

function domain_icon(d) {
  const map = {light:'💡',switch:'🔌',sensor:'📡',binary_sensor:'🔔',
               input_boolean:'🔘',climate:'🌡️',cover:'🪟',media_player:'🎵',
               camera:'📷',lock:'🔒',fan:'💨',vacuum:'🤖'};
  return map[d] || '⚙️';
}

async function poll_ha() {
  try {
    const data = await api('/api/ha/devices');
    render_ha(data);
  } catch(e) {
    set('ha-section', `<div class="error-msg">Home Assistant unreachable</div>`);
  }
}

module(poll_ha, 8000);
</script>
</body>
</html>
