- Backup:
    - Nextcloud Backup:
        href: http://100.90.102.52:8081
        description: Daily at 10:50am
        widget:
          type: customapi
          url: http://100.90.102.52:8081/backup-last.json
          refreshInterval: 60000
          mappings:
            - field: result
              label: "Last result"
            - field: finishedAt
              label: "Finished at"
            - field: durationSeconds
              label: "Duration (s)"
            - field: dbSize
              label: "DB size"

- Storage:
    - Nextcloud Data Dir:
        description: Space usage
        widget:
          type: customapi
          url: http://dashboard-api:8787/api/nextcloud-disk-fields
          refreshInterval: 60000
          mappings:
            - field: total
              label: "Total"
            - field: used
              label: "Used"
            - field: pct
              label: "Used %"
            - field: free
              label: "Free"
    - Backup Server Disk:
        description: Backup laptop storage
        widget:
          type: customapi
          url: http://dashboard-api:8787/api/backup-disk-fields
          refreshInterval: 60000
          mappings:
            - field: total
              label: "Total"
            - field: used
              label: "Used"
            - field: pct
              label: "Used %"
            - field: free
              label: "Free"
- Stats:
    - Main Server:
        href: http://100.87.156.88:61208
        description: Glances (main)
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: info
          disk:
            - /
          uptime: true
          cputemp: true

    - Backup Server:
        href: http://100.90.102.52:61208
        description: Glances (backup)
        widget:
          type: glances
          url: http://100.90.102.52:61208
          version: 4
          metric: info
          disk:
            - /
          uptime: true
          cputemp: true
